gopro_cameras:
  ros__parameters:
    target_fps: 15
    use_hw_decode: true
    use_webcam_api: true       # true = webcam API (H.264 1080p), false = preview stream (H.265 1440p)
    webcam_resolution: 12     # webcam API res: 4=480p, 7=720p, 12=1080p
    keepalive_interval_s: 2.0
    use_compressed: true          # true = CompressedImage (JPEG), false = raw Image (BGR8)
    jpeg_quality: 80              # JPEG compression quality (1-100, only when use_compressed=true)
    reconnect_delay_s: 3.0
    webcam_port_base: 8554     # webcam stream port (camera_1 gets +2)

    camera_0:
      name: "gopro_front"
      ip: "172.22.152.51"
      serial: "C3531350017152"
      udp_port: 8554

    camera_1:
      name: "gopro_back"
      ip: "172.21.106.51"
      serial: "C3531350027106"
      udp_port: 8556
